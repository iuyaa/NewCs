proxy-groups:
  - name: "🚀 节点选择"
    type: "select"
    proxies:
      - "DIRECT"
      - "🎲 智能负载"
      - "🏳️ FINAL"
      - "🛫 极速"
      - "🛫 星链"
      - "🛫 一分"
      - "🛫 69云"
      - "🛫 共享"
      - "☁️ CFWorker"
      - "♻️ 自动选择"
      - "🔯 故障转移"
      - "🚀 手动切换"
      - "🇺🇸 美国节点"
      - "🇰🇷 韩国节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 新加坡节点"
      - "🇭🇰 香港节点"
      - "🇹🇼 台湾节点"
      - "🇨🇳 犄角旮旯"
    filter: "(jiarui)"
  - name: "🚀 手动切换"
    type: "select"
    include-all: true
    filter: ".*"
  # - name: "🔮 负载均衡"
  #   type: "load-balance"
  #   proxies:
  #     - "🛫 极速"
  #     - "🛫 三分"
  #     - "🛫 XSUS"
  #     - "🛫 一分"
  #     - "☁️ CFWorker"
  #   filter: ".*"
  #   url: "http://cp.cloudflare.com/generate_204"
  #   interval: 300
  #   tolerance: 50
  - name: "🎲 智能负载"
    type: "url-test"
    proxies:
      - "🛫 极速"
      - "🛫 星链"
      - "🛫 一分"
      - "🛫 69云"
    include-all: true
    filter: "^(?!.*(jiarui)).*"
    url: "http://cp.cloudflare.com/generate_204"
    interval: 300
    tolerance: 50
  # - name: "🔮 负载均衡"
  #   type: "load-balance"
  #   proxies:
  #     - "🛫 极速"
  #   filter: ".*"
  #   url: "http://cp.cloudflare.com/generate_204"
  #   interval: 300
  #   tolerance: 50
  - name: "♻️ 自动选择"
    include-all: true
    type: "url-test"
    filter: "^(?!.*(jiarui)).*"
    url: "http://cp.cloudflare.com/generate_204"
    interval: 300
    tolerance: 50
  - name: "🔯 故障转移"
    include-all: true
    type: "fallback"
    filter: "^(?!.*(jiarui)).*"
    url: "http://cp.cloudflare.com/generate_204"
    interval: 300
    tolerance: 50
  - name: "🎯 全球直连"
    type: "select"
    proxies:
      - "DIRECT"
      - "🚀 节点选择"
      - "☁️ CFWorker"
      - "♻️ 自动选择"
    filter: "(jiarui)"
  - name: "🧮 JIARUI"
    type: "select"
    proxies:
      - "🎯 全球直连"
      - "🎲 智能负载"
      - "☁️ CFWorker"
      - "🚀 手动切换"
    include-all: true
    filter: "(jiarui)"
  - name: "👻 OpenAi"
    type: "select"
    proxies:
      - "🚀 节点选择"
      - "🏳️ FINAL"
